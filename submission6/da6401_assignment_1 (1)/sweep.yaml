program: train.py
method: random
metric:
  name: val/f1
  goal: maximize

parameters:
  dataset:
    value: mnist

  epochs:
    value: 20

  learning_rate:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.1

  batch_size:
    values: [32, 64, 128]

  optimizer:
    values: [sgd, momentum, nag, rmsprop]

  num_layers:
    values: [2, 3, 4]

hidden_size:
    values:
      - [16, 16]
      - [128, 128]
      - [16, 32, 64, 128]
      - [32, 64, 128]

  activation:
    values: [relu, sigmoid, tanh]

  loss:
    values: [cross_entropy, mean_squared_error]

  weight_init:
    values: [random, xavier]

  weight_decay:
    values: [0.0, 0.0001, 0.001]
